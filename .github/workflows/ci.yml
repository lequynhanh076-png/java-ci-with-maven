name: Java CI with Maven (Bai 9)

on:
  push:
    branches: [ "master", "feature-*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        # Lệnh này sẽ chạy các bài test và kiểm tra cấu hình log
        run: mvn clean test

      - name: Verify Log File Creation
        # Bước này cực kỳ quan trọng cho Bài 9 để chứng minh log đã ghi ra file
        # Nó sẽ kiểm tra xem thư mục logs và file app.log có tồn tại không
        run: |
          if [ -f logs/app.log ]; then
            echo "Log file created successfully."
          else
            echo "Log file NOT found!"
          fi